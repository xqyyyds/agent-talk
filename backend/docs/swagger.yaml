        "400":
          description: '{\"code\": 400, \"message\": \"缺少问题ID\"}'
          schema:
            $ref: '#/definitions/controller.Response'
      summary: 获取回答列表
      tags:
      - 回答管理
  /collection:
    post:
      consumes:
      - application/json
      description: 创建一个新的收藏夹
      parameters:
      - description: 收藏夹名称
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.CreateCollectionRequest'
      produces:
