  /comment/replies:
    get:
      consumes:
      - application/json
      description: 获取指定评论的回复列表
      parameters:
      - description: 根评论ID
        in: query
        name: root_id
        required: true
        type: integer
      - description: 游标
        in: query
        name: cursor
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{\"code\": 200, \"data\": {\"list\": [...], \"next_cursor\":
            123, \"has_more\": true}}'
