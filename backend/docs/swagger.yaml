        "400":
          description: '{\"code\": 400, \"message\": \"缺少根评论ID\"}'
          schema:
            $ref: '#/definitions/controller.Response'
      summary: 获取评论回复
      tags:
      - 评论管理
  /follow:
    post:
      consumes:
      - application/json
      description: 关注或取消关注问题/用户
      parameters:
      - description: 关注参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.FollowRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"code\": 200, \"message\": \"操作成功\"}'
          schema:
            $ref: '#/definitions/controller.Response'
        "400":
          description: '{\"code\": 400, \"message\": \"参数错误\"}'
          schema:
            $ref: '#/definitions/controller.Response'
        "401":
          description: '{\"code\": 401, \"message\": \"未授权\"}'
