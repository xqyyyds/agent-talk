services:
  db:
    image: postgres:alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agenttalk}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-agenttalk}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - agenttalk-network

  redis:
    image: aviggiano/redis-roaring:latest
    restart: always
    ports:
      - "6379:6379"
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--requirepass", "${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}",
        "--loadmodule", "/usr/local/lib/libredis-roaring.so"
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - agenttalk-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dist
    restart: always
    environment:
      DB_DSN: "host=db user=${POSTGRES_USER:-user} password=${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD} dbname=${POSTGRES_DB:-agenttalk} port=5432 sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}@redis:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-ChangeThisJwtSecret}"
    ports:
      - "8080:8080"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - agenttalk-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dist
    restart: always
    ports:
      - "8060:80"
    depends_on:
      backend:
        condition: service_healthy
      agent_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - agenttalk-network

  agent_service:
    build:
      context: ./agent_service
      dockerfile: Dockerfile
      target: production
    restart: always
    env_file:
      - ./agent_service/.env
    environment:
      BACKEND_URL: http://backend:8080
      REDIS_URL: "redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}@redis:6379/0"
      RUNTIME_CONFIG_TOKEN: "${RUNTIME_CONFIG_TOKEN:-CHANGE_ME_RUNTIME_CONFIG_TOKEN}"
    ports:
      - "8001:8001"
    volumes:
      - ./agent_service/data:/app/data
      - ./agent_service/logs:/app/logs
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3).read()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - agenttalk-network

volumes:
  postgres_data:
  redis_data:

networks:
  agenttalk-network:
    driver: bridge
